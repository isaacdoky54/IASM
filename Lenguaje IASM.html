<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>IASM Traductor</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.app{
    width:420px;
    background:#1c1c1c;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
    text-align:center;
    margin-bottom:10px;
}

textarea{
    width:100%;
    height:120px;
    border-radius:10px;
    padding:10px;
    font-size:14px;
    resize:none;
    outline:none;
    border:none;
}

.buttons{
    display:flex;
    gap:10px;
}

button{
    flex:1;
    margin-top:10px;
    padding:10px;
    border:none;
    border-radius:10px;
    background:#00c6ff;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:hover{
    background:#0099cc;
}

#resultado{
    margin-top:10px;
    background:#333;
    padding:10px;
    border-radius:10px;
    max-height:200px;
    overflow:auto;
    white-space:pre-wrap;
    font-size:14px;
}

.copy{
    background:#4caf50;
}

.copy:hover{
    background:#388e3c;
}

.info{
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
    text-align:center;
}
</style>
</head>

<body>

<div class="app">
<h2>Traductor IASM</h2>

<textarea id="input" placeholder="Escribe o pega texto..."></textarea>

<div class="buttons">
<button onclick="traducir()">Traducir</button>
<button class="copy" onclick="copiar()">Copiar</button>
</div>

<div id="resultado"></div>
<div class="info">Detecta automáticamente si es código o texto normal</div>
</div>

' ':'/'

const inv = Object.fromEntries(Object.entries(dic).map(([k,v]) => [v,k]));

function normalizar(texto){
    return texto.toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g,"");
}

// 🔥 detección mejorada
function esRaro(texto){
    let palabras = texto.split(/\s+/);
    let matches = palabras.filter(p => inv[p]).length;
    return matches > 3;
}

// 🔥 limpieza inteligente
function limpiar(texto){
    return texto
        .replace(/\b(\w+)( \1\b)+/g, '$1') // repeticiones
        .replace(/\s+/g," ")
        .trim();
}

function aRaro(texto){
    return texto.split("").map(l => dic[l] || l).join(" ");
}

function aEsp(texto){
    let res = texto.split(/\s+/).map(p => {
        if(p === "/") return " ";
        return inv[p] || "";
    }).join("");

    return limpiar(res);
}

function traducir(){
    let raw = input.value;
    if(!raw.trim()) return;

    let texto = normalizar(raw);
    let resultado = esRaro(texto) ? aEsp(texto) : aRaro(texto);

    document.getElementById("resultado").innerText = resultado;
}

// copiar resultado
function copiar(){
    let texto = document.getElementById("resultado").innerText;
    if(!texto) return;

    navigator.clipboard.writeText(texto);
    alert("Copiado al portapapeles");
}
</script>
